name: Build and push to Docker packages

# Controls when the action will run.
on:
  workflow_dispatch:
  # Triggers the workflow on push request on the main branch for changes in the specified paths.
  push:
    branches:
      - main
      - nightly
    paths:
      - 'Dockerfile'
      - 'src/**'
      - '.github/workflows/**'
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    # Build the server and the (isolated) crawler image in parallel. Each
    # entry produces its own ghcr.io tag; the crawler image is what
    # kubernetes/30-lighthouse.yaml references as
    # `ghcr.io/lighthouse-search/lighthouse-crawler:latest`.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            image: ghcr.io/${{ github.repository }}
            dockerfile: ./server/Dockerfile
          - name: crawler
            image: ghcr.io/${{ github.repository }}-crawler
            dockerfile: ./crawling/crawler/firefox-agent/Dockerfile

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:

    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it.
    - name: Checkout master
      uses: actions/checkout@main

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: downcase REPO
      run: |
        echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

    - name: Build and push Docker image (${{ matrix.name }})
      uses: docker/build-push-action@v5
      with:
        file: ${{ matrix.dockerfile }}
        context: ./
        push: true
        tags: |
          ${{ matrix.image }}:${{ github.ref_name == 'main' && 'latest' || format('{0}-latest', github.ref_name) }}
